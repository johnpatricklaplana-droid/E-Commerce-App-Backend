<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
</head>
<body class="items-center flex justify-center bg-blue-100 h-screen w-screen">
    <form class="flex flex-col gap-1.5 items-center bg-white p-2.5  
            sm:rounded-2xl w-96 py-5" action="">
        <h1 class="text-blue-600 text-2xl font-bold tracking-wide text-center">
            ShopEase
        </h1>
        <div>
            <h2 class="text-2xl font-bold">Login as seller</h2>
            <p class="text-sm text-center">please login a litte</p>
        </div>
        <input class="py-3 bg-blue-100 w-full px-6 rounded-2xl outline-0" type="email" placeholder="Email address">
        <input class="py-3 bg-blue-100 w-full px-6 rounded-2xl outline-0" type="password" name="" id="" placeholder="Password">
        <p class="text-end text-xs">Forgot passowrd?</p>
        <button class="font-bold w-full bg-blue-600 py-3 px-6 rounded-2xl text-white hover:bg-blue-700">Login</button>
        <div class="flex gap-3 justify-center items-center w-full px-4">
            <hr class="w-full"><span class="whitespace-nowrap text-sm">Or login with</span>
            <hr class="w-full">
        </div>
        <div class="px-2 w-full border-gray-400 py-3 justify-center hover:bg-blue-100 rounded-2xl flex items-center border gap-2">
            <img width="25" height="25" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo" />
            <span class="text-sm">Google</span>
        </div>
        <div class="px-2 w-full py-3 border-gray-400 justify-center hover:bg-blue-100 rounded-2xl flex items-center border gap-2">
            <img width="25" height="25" src="https://img.icons8.com/color/48/facebook-new.png" alt="facebook-new" />
            <span class="text-sm">Facebook</span>
        </div>
        <p class="text-center">don't have an account? <a class="text-blue-600 hover:underline" href="#">Sign up</a></p>
    </form>
    <script type="module" src="http://localhost:5173/src/main.js"></script>
</body>
</html>
