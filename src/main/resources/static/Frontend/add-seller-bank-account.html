<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add some</title>
</head>
<body>
    
    <div class="h-screen flex bg-blue-100 w-screen justify-center items-center">
        <form class="rounded-2xl sm:w-96 shadow-2xl flex flex-col gap-2.5 bg-white p-6" action="">
            <div class="flex items-center gap-2.5">
                <svg width="40" height="50" viewBox="0 0 35 45">
                    <path d="M2 2 L22 2 L32 12 L32 42 L2 42 L2 2 Z M22 2 L22 12 L31 12 Z" stroke="#93c5fd" fill="none"
                        stroke-width="3" />
                    <rect x="5" ry="2" rx="2" y="15" width="24" height="3" fill="#93c5fd" />
                    <rect x="5" ry="2" rx="2" y="20" width="24" height="3" fill="#93c5fd" />
                </svg>
                <h1 class="text-2xl">Bank Account Details</h1>
            </div>
            <div class="flex gap-1 flex-col">
                <label class="text-sm" for="">Bank Account Number</label>
                <input id="bankAccountNumber" class="p-2.5 rounded bg-blue-100 outline-0" type="text" >
            </div>
            <div class="flex gap-1 flex-col">
                <label class="text-sm" for="">Account Type</label>
                <select id="accountType" class="p-2.5 rounded bg-blue-100 appearance-none outline-0" type="text">
                    <option value="Savings Account">Savings</option>
                    <option value="Money Market Account">Money Market Account</option>
                    <option value="Certificates of Deposit">Certificates of Deposit</option>
                    <option value="Retirement Accounts">Retirement Accounts</option>
                </select>
            </div>
            <button id="submitBankAccountDetails" class="bg-blue-400 mt-4 text-white hover:bg-blue-500 font-bold p-2.5 rounded">Submit</button>
        </form>
    </div>

    <script type="module" src="http://localhost:5173/src/main.js"></script>
