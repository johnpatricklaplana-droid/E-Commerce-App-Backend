<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shopease sign up</title>
</head>
<body class="h-screen justify-center flex items-center bg-blue-950">
    <form id="costumer_signup_form" class="flex sm:w-96 h-150 sm:rounded-2xl sm:px-5 items-center gap-1.5 py-2.5 shadow-2xl px-1.5 w-screen flex-col" action="">
        <h1 class="text-white text-center text-lg sm:text-2xl font-bold">Create
            <span class="text-blue-600 text-lg sm:text-2xl font-bold tracking-wide text-center">
                ShopEase
            </span>
            account
        </h1>
        <div class=" overflow-auto flex flex-col w-full scrollbar-none gap-1.5 py-2.5 px-1.5">
            <label for="" class="text-white">First Name</label>
            <input id="costumer_first_name" type="text" class="text-white w-full outline-none rounded
                      border-gray-400 border px-2.5 py-2.5" placeholder="enter you first name">
            <label for="" class="text-white">Last Name</label>
            <input id="costumer_last_name" type="text" class="text-white w-full outline-none rounded
                      border-gray-400 border px-2.5 py-2.5" placeholder="enter you last name">
            <label for="" class="text-white">street</label>
            <input id="costumer_street" type="text" class="text-white w-full outline-none rounded
                      border-gray-400 border px-2.5 py-2.5" placeholder="street">
            <label for="" class="text-white">city</label>
            <select class="bg-white w-full outline-none rounded
                      border-gray-400 border px-2.5 py-2.5" id="costumer_city">
                <option value="Cebu City">Cebu City</option>
                <option value="Davao City">Davao City</option>
                <option value="Makati City">Makati City</option>
                <option value="Quezon City">Quezon City</option>
                <option value="Taguig City">Taguig City</option>
            </select>
            <label for="" class="text-white">province</label>
            <select id="costumer_province" type="text" class="text-black w-full outline-none rounded
                     border-gray-400 border px-2.5 py-2.5 bg-white">
                <option value="Cebu">Cebu</option>
                <option value="Davao del Sur">Davao del Sur</option>
                <option value="Metro Manila">Metro Manila</option>
            </select>
            <label for="" class="text-white">postal code</label>
            <input id="costumer_postal_code" type="text" class="text-white w-full outline-none rounded 
                    border-gray-400 border px-2.5 py-2.5" placeholder="postal code">
            <label for="" class="text-white">country</label>
            <select id="costumer_country" type="text" class="bg-white w-full outline-none rounded 
                    border-gray-400 border px-2.5 py-2.5" placeholder="country">
                <option value="Philippines">Philippines</option>
            </select>
            <label for="" class="text-white">Email</label>
            <input id="costumer_email" type="email" class="text-white w-full outline-none rounded 
                    border-gray-400 border px-2.5 py-2.5" placeholder="enter some email">
            <label for="" class="text-white">Password</label>
            <input id="constumer_password" type="password" class="text-white w-full outline-none rounded
                    border-gray-400 border px-2.5 py-2.5" placeholder="create powerful password">
            <label for="" class="text-white">confirm password</label>
            <input id="costumer_confirm_password" type="password" class="text-white w-full outline-none rounded 
                    border-gray-400 border px-2.5 py-2.5"
                    placeholder="confirm password">
        </div>
        <button id="costumer_signup_button" type="submit" class="w-full px-2.5 py-2.5 hover:bg-blue-600 bg-blue-500 mt-1.5 text-white">Register</button>
        <div class="flex gap-3 justify-center items-center w-full px-4">
            <hr class="w-full text-white"><span class="text-white whitespace-nowrap text-sm">Or sign in with</span>
            <hr class="w-full text-white">
        </div>
        <div class="flex w-full justify-center gap-1">
            <div class="px-2 border-gray-400 w-[40%] py-1.5 justify-center
                        rounded-2xl flex items-center border gap-2">
                <img width="20" height="20" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo" />
                <span class="text-sm text-white">Google</span>
            </div>
            <div class="px-2 py-1.5 border-gray-400 w-[40%] justify-center rounded-2xl flex items-center border gap-2">
                <img width="20" height="20" src="https://img.icons8.com/color/48/facebook-new.png" alt="facebook-new" />
                <span class="text-sm text-white">Facebook</span>
            </div>
        </div>
        <p class="text-white">already have some?</p>
        <a class="text-black hover:bg-orange-500 bg-orange-400 text-center rounded-2xl py-1.5 px-2.5 w-40" href="costumer-login-page.html">login</a>
    </form>
    <script type="module" src="http://localhost:5173/src/main.js"></script>
    <script type="module" src="src/utils/boilerplate_code_handler.js"></script>
    <script type="module" src="src/pages/costumer_signup.js"></script>
</body>
</html>
