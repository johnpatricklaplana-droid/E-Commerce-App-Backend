                            <circle cx="10" cy="10" r="10" fill="gray" />
                        </svg>
                        <p class="text-gray-300 text-sm">Seller Documents</p>
                    </div>
                    <div class="flex items-center gap-1 hover:bg-blue-600 px-2 py-1.5">
                        <svg width="20" height="20" viewBox="0 0 20 20">
                            <circle cx="10" cy="10" r="10" fill="gray" />
                        </svg>
                        <p class="text-gray-300 text-sm">Todo</p>
                    </div>
                    <div class="flex items-center gap-1 hover:bg-blue-600 px-2 py-1.5">
                        <svg width="20" height="20" viewBox="0 0 20 20">
                            <circle cx="10" cy="10" r="10" fill="gray" />
                        </svg>
                        <p class="text-gray-300 text-sm">Todo</p>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-1.5">
                    <label class="text-gray-100 text-[14px] w-full px-1" for="">TODO</label>
                    <div class="flex items-center w-full hover:bg-blue-600 px-2 py-1.5 gap-1.5">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5A3.5 3.5 0 1 0 12 15.5Z" stroke="#D1D5DB" stroke-width="2" />

                <h1 class="text-lg font-bold font-serif">Seller Registration Document Paper</h1>

                        <circle cx="12" cy="19" r="1.5" stroke="gray" stroke-width="2" />
                    </svg>
                    <span>TODO</span>
                </div>
            </div>

                    <h1 class="text-lg font-bold">Files</h1>
                    <div class="w-[60%] flex gap-1">
                        <input class="outline-0 w-full shadow rounded-tl-2xl rounded-bl-2xl bg-white px-3 py-1.5" placeholder="Search files" type="search">
                        <button class="bg-blue-900 font-bold hover:bg-blue-700 shadow text-white py-1.5 px-3 rounded-tr-2xl rounded-br-2xl">Search</button>
                    </div>
                    <div>
                        <select class="bg-white py-1.5 rounded shadow outline-0">
                            <option value="">DATE</option>
                            <option value="">TODO</option>
                            <option value="">TODO</option>
                        </select>
                        <select class="bg-white rounded py-1.5 shadow outline-0">
                            <option value="PENDING">Pending</option>
                            <option value="ACCEPTED">Accepted</option>
                            <option value="REJECTED">Rejected</option>
                        </select>
                    </div>
                </div>
                <!-- MAIN CONTENT -->
                <div id="sellerDocumentContainer" class="bg-white p-3 overflow-auto rounded-2xl h-full min-h-0">
                    <div class="flex border-b border-gray-400 px-1.5 py-1.5 items-center justify-between">
                        <h1>File name</h1>
                        <div class="flex px-1.5 py-1.5 justify-between w-1/2">
                            <h1>owner</h1>
                            <h1>file size</h1>
                            TODO
                        </div>
                    </div>
