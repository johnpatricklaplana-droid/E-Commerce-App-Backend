<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seller signup</title>
</head>
<body>
    <div class="h-screen bg-blue-100 w-screen flex items-center justify-center">
        <form class="flex w-full sm:bg-white sm:shadow-2xl rounded-2xl sm:w-125 flex-col justify-center gap-2.5 items-center p-6" action="">
            <h1 class="text-3xl font-bold">Seller Sign Up</h1>
            <h2 class="text-gray-400">Create your seller account</h2>
            <hr class="w-full text-gray-400">
            <div class="flex w-full gap-2.5">
                <div class="flex w-full flex-col">
                    <label class="text-sm" for="">First Name</label>
                    <input id="first_name_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="text" placeholder="Enter your first name">
                </div>
                <div class="flex w-full flex-col">
                    <label class="text-sm" for="">Last Name</label>
                    <input id="last_name_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="text" placeholder="Enter your last name">
                </div>
            </div>
            <hr class="w-full text-gray-400">
            <div class="flex flex-col w-full">
                <label class="text-sm" for="">Street Address</label>
                <input id="street_signup" class="border border-gray-400 rounded p-1.5 outline-0 text-sm" type="text" placeholder="Enter your steet address">
            </div>
            <hr class="w-full text-gray-400">
            <div class="flex justify-between items-center gap-2.5 w-full">
                <div class="w-full">
                    <label class="text-sm" for="">City</label>
                    <input id="city_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="text" placeholder="Enter your city">
                </div>
                <div class="w-full">
                    <label class="text-sm" for="">Province/State</label>
                    <input id="province_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="text" placeholder="Select province/state">
                </div>
                <div class="w-full">
                    <label class="text-sm" for="">Postal Code</label>
                    <input id="postal_code_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="text" placeholder="Enter postal code">
                </div>
            </div>
            <hr class="w-full text-gray-400">
            <div class="w-full">
                <label class="text-sm" for="">Country</label>
                <select id="country_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" name="">
                    <option value="Philippines">Philippines</option>
                </select>
            </div>
            <hr class="text-gray-400 w-full">
            <div class="w-full flex flex-col">
                <label class="text-sm" for="">Email Address</label>
                <input id="email_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="email" placeholder="Enter you email address">
            </div>
            <hr class="w-full text-gray-400">
            <div class="w-full flex flex-col">
                <label class="text-sm" for="">Password</label>
                <input id="password_signup" class="border w-full border-gray-400 rounded p-1.5 outline-0 text-sm" type="password" placeholder="Create a password">
            </div>
            <button id="signupSubmitButton" class="w-full bg-blue-800 text-white py-1.5 rounded font-bold">Sign Up</button>
        </form>
    </div>

    <script type="module" src="/Frontend/src/pages/seller_signup.js"></script>
    <script type="module" src="http://localhost:5173/src/main.js"></script>
</body>
</html>
