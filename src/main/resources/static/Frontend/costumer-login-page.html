<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase login</title>
</head>
<body>
    <main class="flex justify-center items-center px-10 h-screen w-screen bg-blue-100">
        <form class="bg-white rounded-3xl flex justify-around w-full">
            <div class="hidden sm:flex flex-col items-center px-10 py-10 h-142.5 w-96 bg-cover rounded-2xl bg-[url('/Frontend/public/cuties.png')]">
                <h1 class="font-[inter] text-blue-950 text-3xl font-bold text-start">Everything you love, in one place.</h1>
                <p class="text-cyan-900 text-start text-sm">Discover great products, enjoy seamless checkout, and experience
                    shopping made simple.</p>
            </div>
            
            <div class="flex flex-col gap-3 rounded-2xl px-3 py-6 h-142.5 w-96">
                <h1 class="text-blue-600 text-2xl font-bold tracking-wide text-center">
                    ShopEase
                </h1>
                <h1 class= "text-2xl font-bold tracking-wide text-center">
                    Welcome back
                    <p class="text-center text-sm font-normal">Please login a litte</p>
                </h1>
                <input class="py-3 bg-blue-100 w-full px-6 rounded-2xl outline-0" type="email" placeholder="Email address">
                <input class="py-3 bg-blue-100 w-full px-6 rounded-2xl outline-0" type="password" name="" id="" placeholder="Password">
                <p class="text-end text-xs">Forgot passowrd?</p>
                <button class="font-bold bg-blue-600 py-3 px-6 rounded-2xl text-white hover:bg-blue-700">Login</button>
                <div class="flex gap-3 justify-center items-center w-full px-4">
                    <hr class="w-full"><span class="whitespace-nowrap text-sm">Or login with</span>
                    <hr class="w-full">
                </div>
                <div class="px-2 border-gray-400 py-3 justify-center hover:bg-blue-100 rounded-2xl flex items-center border gap-2">
                    <img width="25" height="25" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo" />
                    <span class="text-sm">Google</span>
                </div>
                <div class="px-2 py-3 border-gray-400 justify-center hover:bg-blue-100 rounded-2xl flex items-center border gap-2">
                    <img width="25" height="25" src="https://img.icons8.com/color/48/facebook-new.png" alt="facebook-new" />
                    <span class="text-sm">Facebook</span>
                </div>
                <p class="text-center">don't have an account? <a class="text-blue-600 hover:underline" href="#">Sign up</a></p>
            </div>
        </form>
    </main>

    <script type="module" src="http://localhost:5173/src/main.js"></script>
</body>
</html>
